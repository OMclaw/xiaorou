<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="960" height="600" fill="url(#bgGrad)"/>
  
  <!-- 网格装饰 -->
  <g stroke="rgba(0,217,255,0.1)" stroke-width="1">
    <line x1="0" y1="100" x2="960" y2="100"/>
    <line x1="0" y1="200" x2="960" y2="200"/>
    <line x1="0" y1="300" x2="960" y2="300"/>
    <line x1="0" y1="400" x2="960" y2="400"/>
    <line x1="0" y1="500" x2="960" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="900" y1="0" x2="900" y2="600"/>
  </g>
  
  <!-- 中心 GPU 图标 -->
  <g transform="translate(480, 280)" filter="url(#glow)">
    <!-- GPU 主体 -->
    <rect x="-80" y="-60" width="160" height="120" rx="8" fill="url(#gpuGrad)"/>
    <!-- GPU 内部电路 -->
    <g fill="rgba(0,0,0,0.3)">
      <rect x="-60" y="-40" width="40" height="40" rx="4"/>
      <rect x="-10" y="-40" width="40" height="40" rx="4"/>
      <rect x="40" y="-40" width="40" height="40" rx="4"/>
      <rect x="-60" y="10" width="40" height="40" rx="4"/>
      <rect x="-10" y="10" width="40" height="40" rx="4"/>
      <rect x="40" y="10" width="40" height="40" rx="4"/>
    </g>
    <!-- 连接点 -->
    <g fill="#1a1a2e">
      <circle cx="-80" cy="-30" r="4"/>
      <circle cx="-80" cy="0" r="4"/>
      <circle cx="-80" cy="30" r="4"/>
      <circle cx="80" cy="-30" r="4"/>
      <circle cx="80" cy="0" r="4"/>
      <circle cx="80" cy="30" r="4"/>
    </g>
  </g>
  
  <!-- 标题 -->
  <text x="480" y="460" text-anchor="middle" font-size="42" font-weight="bold" fill="white" letter-spacing="6">Rise</text>
  <text x="480" y="500" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.7)">租赁算力商业框架分析</text>
  
  <!-- 数据标签 -->
  <g transform="translate(120, 60)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="rgba(0,217,255,0.15)" stroke="rgba(0,217,255,0.3)"/>
    <text x="80" y="22" text-anchor="middle" font-size="24" font-weight="bold" fill="#00d9ff">500 亿</text>
    <text x="80" y="42" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.6)">市场规模 (2025)</text>
  </g>
  
  <g transform="translate(680, 60)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="rgba(0,255,136,0.15)" stroke="rgba(0,255,136,0.3)"/>
    <text x="80" y="22" text-anchor="middle" font-size="24" font-weight="bold" fill="#00ff88">68%</text>
    <text x="80" y="42" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.6)">同比增长</text>
  </g>
  
  <g transform="translate(120, 540)">
    <rect x="0" y="0" width="140" height="35" rx="17" fill="rgba(255,255,255,0.1)"/>
    <text x="70" y="23" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)">💰 成本降低 80%</text>
  </g>
  
  <g transform="translate(340, 540)">
    <rect x="0" y="0" width="140" height="35" rx="17" fill="rgba(255,255,255,0.1)"/>
    <text x="70" y="23" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)">⚡ 分钟级部署</text>
  </g>
  
  <g transform="translate(560, 540)">
    <rect x="0" y="0" width="140" height="35" rx="17" fill="rgba(255,255,255,0.1)"/>
    <text x="70" y="23" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)">🔄 1-1000 卡弹性</text>
  </g>
  
  <g transform="translate(780, 540)">
    <rect x="0" y="0" width="140" height="35" rx="17" fill="rgba(255,255,255,0.1)"/>
    <text x="70" y="23" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)">📈 32% 毛利率</text>
  </g>
</svg>