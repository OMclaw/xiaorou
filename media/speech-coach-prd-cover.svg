<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="960" height="600" fill="url(#bgGrad)"/>
  
  <!-- 声波装饰 -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none">
    <path d="M 100 300 Q 150 250 200 300 T 300 300"/>
    <path d="M 100 320 Q 150 270 200 320 T 300 320"/>
    <path d="M 100 340 Q 150 290 200 340 T 300 340"/>
    <path d="M 660 300 Q 710 250 760 300 T 860 300"/>
    <path d="M 660 320 Q 710 270 760 320 T 860 320"/>
    <path d="M 660 340 Q 710 290 760 340 T 860 340"/>
  </g>
  
  <!-- 中心麦克风图标 -->
  <g transform="translate(480, 280)" filter="url(#glow)">
    <!-- 麦克风主体 -->
    <rect x="-40" y="-60" width="80" height="120" rx="40" fill="url(#micGrad)"/>
    <!-- 麦克风网格 -->
    <g stroke="rgba(255,255,255,0.5)" stroke-width="2">
      <line x1="-20" y1="-40" x2="-20" y2="20"/>
      <line x1="-10" y1="-40" x2="-10" y2="20"/>
      <line x1="0" y1="-40" x2="0" y2="20"/>
      <line x1="10" y1="-40" x2="10" y2="20"/>
      <line x1="20" y1="-40" x2="20" y2="20"/>
      <line x1="-30" y1="-20" x2="30" y2="-20"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
    </g>
    <!-- 麦克风支架 -->
    <rect x="-10" y="60" width="20" height="60" fill="#f5576c"/>
    <rect x="-30" y="120" width="60" height="10" rx="5" fill="#f5576c"/>
  </g>
  
  <!-- 标题 -->
  <text x="480" y="480" text-anchor="middle" font-size="36" font-weight="bold" fill="white" letter-spacing="4">言犀</text>
  <text x="480" y="520" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.8)">AI 演讲培训师 · PRD</text>
  
  <!-- 功能标签 -->
  <g transform="translate(120, 80)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="70" y="26" text-anchor="middle" font-size="14" fill="white">🎯 实时反馈</text>
  </g>
  
  <g transform="translate(700, 80)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="70" y="26" text-anchor="middle" font-size="14" fill="white">🧠 多维分析</text>
  </g>
  
  <g transform="translate(120, 560)">
    <rect x="0" y="0" width="140" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
    <text x="70" y="20" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">🎭 场景模拟</text>
  </g>
  
  <g transform="translate(700, 560)">
    <rect x="0" y="0" width="140" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
    <text x="70" y="20" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">📈 成长追踪</text>
  </g>
  
  <!-- 阿里云 Logo 提示 -->
  <text x="480" y="570" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">Powered by 阿里云 Qwen3.5-Omni</text>
</svg>